<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK → TG Парсер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h3 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        .btn.success {
            background: #10b981;
            color: white;
        }
        
        .btn.success:hover {
            background: #059669;
        }
        
        .btn.warning {
            background: #f59e0b;
            color: white;
        }
        
        .btn.warning:hover {
            background: #d97706;
        }
        
        .btn.danger {
            background: #ef4444;
            color: white;
        }
        
        .btn.danger:hover {
            background: #dc2626;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
        
        .status-badge.active {
            background: #10b981;
            color: white;
        }
        
        .status-badge.inactive {
            background: #ef4444;
            color: white;
        }
        
        .logs {
            background: #1a1a1a;
            color: #00ff00;
            font-family: monospace;
            padding: 15px;
            border-radius: 8px;
            height: 250px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 5px;
            border-bottom: 1px solid #333;
            font-size: 0.9em;
        }
        
        .info-box {
            background: #e0f2fe;
            border-left: 4px solid #0284c7;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 VK → TG Парсер</h1>
            <p>Управление парсером для ilyasigma111/VkParser</p>
        </div>
        
        <div class="card">
            <h3>🔑 Статус</h3>
            <div style="margin-bottom: 15px;">
                <span class="status-badge" id="tokenValidStatus">⚡ Проверка...</span>
                <span style="margin-left: 15px;">Репозиторий: ilyasigma111/VkParser</span>
            </div>
        </div>
        
        <div class="card">
            <h3>🎮 Управление</h3>
            <div style="margin-bottom: 20px;">
                <span class="status-badge" id="parserStatus">⚪ Статус неизвестен</span>
                <span style="margin-left: 15px;">Последний запуск: <span id="lastRun">никогда</span></span>
            </div>
            
            <button class="btn success" onclick="runCommand('check')">🔍 Проверить новые</button>
            <button class="btn warning" onclick="runCommand('catchup')">⏪ Догнать пропущенные</button>
            <button class="btn danger" onclick="runCommand('reset')">🔄 Сброс состояния</button>
        </div>
        
        <div class="card">
            <h3>📋 Логи</h3>
            <div class="logs" id="logs">
                <div class="log-entry">🚀 Интерфейс загружен</div>
            </div>
            <div style="margin-top: 10px;">
                <button class="btn" onclick="clearLogs()">🗑 Очистить</button>
                <button class="btn" onclick="refreshLogs()">🔄 Обновить</button>
            </div>
        </div>
    </div>
    
    <script>
        // ========== ТВОИ ДАННЫЕ ==========
        const GITHUB_TOKEN = "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";
        const REPO_NAME = "ilyasigma111/VkParser";
        // ================================
        
        async function checkToken() {
            const tokenStatus = document.getElementById('tokenValidStatus');
            
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_NAME}`, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (response.ok) {
                    tokenStatus.textContent = '✅ Токен работает';
                    tokenStatus.className = 'status-badge active';
                    addLog('✅ GitHub токен валиден', 'success');
                } else {
                    tokenStatus.textContent = '❌ Ошибка токена';
                    tokenStatus.className = 'status-badge inactive';
                    addLog(`❌ Ошибка: ${response.status}`, 'error');
                }
            } catch (error) {
                tokenStatus.textContent = '❌ Ошибка сети';
                tokenStatus.className = 'status-badge inactive';
            }
        }
        
        async function runCommand(command) {
            addLog(`🚀 Запускаю: ${command}...`, 'info');
            document.getElementById('parserStatus').textContent = '⏳ Выполняется...';
            
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_NAME}/actions/workflows/manual.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: { command: command }
                    })
                });
                
                if (response.status === 204) {
                    addLog(`✅ Команда ${command} запущена`, 'success');
                    document.getElementById('parserStatus').textContent = '✅ Запущено';
                    document.getElementById('lastRun').textContent = new Date().toLocaleTimeString();
                } else {
                    addLog(`❌ Ошибка: ${response.status}`, 'error');
                    document.getElementById('parserStatus').textContent = '❌ Ошибка';
                }
            } catch (error) {
                addLog(`❌ Ошибка: ${error.message}`, 'error');
                document.getElementById('parserStatus').textContent = '❌ Ошибка';
            }
        }
        
        async function refreshLogs() {
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_NAME}/actions/runs?per_page=5`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    addLog('📊 Последние запуски:', 'info');
                    data.workflow_runs.forEach(run => {
                        const status = run.conclusion || 'pending';
                        const emoji = status === 'success' ? '✅' : status === 'failure' ? '❌' : '⏳';
                        const date = new Date(run.created_at).toLocaleString();
                        addLog(`${emoji} ${status} (${date})`, 'info');
                    });
                }
            } catch (error) {
                addLog(`❌ Ошибка: ${error.message}`, 'error');
            }
        }
        
        function addLog(msg, type = 'info') {
            const logs = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            const prefix = type === 'success' ? '✅ ' : type === 'error' ? '❌ ' : '';
            
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `[${time}] ${prefix}${msg}`;
            logs.insertBefore(logEntry, logs.firstChild);
            
            if (logs.children.length > 50) logs.removeChild(logs.lastChild);
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
            addLog('🧹 Логи очищены', 'info');
        }
        
        window.onload = function() {
            checkToken();
            addLog('🚀 Интерфейс загружен', 'success');
        };
    </script>
</body>
</html>
