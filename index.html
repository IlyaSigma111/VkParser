<!DOCTYPE html>
<html>
<head>
    <title>VK → TG Парсер</title>
    <style>
        body { font-family: Arial; background: #667eea; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #667eea; color: white; border: none; border-radius: 5px; }
        .logs { background: black; color: #00ff00; padding: 10px; height: 200px; overflow-y: auto; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 VK → TG Парсер</h2>
        <p>Репозиторий: ilyasigma111/VkParser</p>
        
        <button onclick="run('check')">🔍 Проверить новые</button>
        <button onclick="run('catchup')">⏪ Догнать</button>
        <button onclick="run('reset')">🔄 Сброс</button>
        
        <h3>Логи:</h3>
        <div class="logs" id="logs"></div>
    </div>

    <script>
        const TOKEN = "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";
        const REPO = "ilyasigma111/VkParser";
        
        async function run(cmd) {
            addLog(`🚀 Запускаю ${cmd}...`);
            
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/manual.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ ref: 'main', inputs: { command: cmd } })
                });
                
                if (res.status === 204) {
                    addLog(`✅ Команда ${cmd} запущена!`);
                    addLog(`👀 Смотри: https://github.com/${REPO}/actions`);
                } else {
                    addLog(`❌ Ошибка ${res.status}`);
                }
            } catch (e) {
                addLog(`❌ Ошибка`);
            }
        }
        
        function addLog(msg) {
            const d = document.createElement('div');
            d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            document.getElementById('logs').prepend(d);
        }
    </script>
</body>
</html>
