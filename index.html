<!DOCTYPE html>
<html>
<head>
    <title>VK → TG</title>
</head>
<body>
    <h1>🚀 VK → TG ПАРСЕР</h1>
    
    <input type="password" id="tokenField" style="width:100%; padding:10px; margin:10px 0;" placeholder="Вставь новый токен">
    <button onclick="saveToken()">💾 СОХРАНИТЬ</button>
    
    <button onclick="run('check')">🔍 ПРОВЕРИТЬ</button>
    <button onclick="run('catchup')">⏪ ДОГНАТЬ</button>
    
    <div id="log" style="background:black; color:#0f0; padding:10px; margin-top:20px; height:300px; overflow:auto;"></div>
    
    <script>
        let TOKEN = localStorage.getItem('vk_token') || '';
        const REPO = "ilyasigma111/VkParser";
        
        if (TOKEN) document.getElementById('tokenField').value = '********';
        
        function saveToken() {
            TOKEN = document.getElementById('tokenField').value;
            localStorage.setItem('vk_token', TOKEN);
            log('✅ Токен сохранен');
        }
        
        async function run(cmd) {
            if (!TOKEN) { log('❌ Сначала введи токен'); return; }
            log(`🔄 ${cmd}...`);
            
            const r = await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/manual.yml/dispatches`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ ref: 'main', inputs: { command: cmd } })
            });
            
            log(r.status === 204 ? '✅ ГОТОВО!' : `❌ Ошибка ${r.status}`);
        }
        
        function log(m) {
            const d = document.createElement('div');
            d.textContent = `[${new Date().toLocaleTimeString()}] ${m}`;
            document.getElementById('log').prepend(d);
        }
    </script>
</body>
</html>
