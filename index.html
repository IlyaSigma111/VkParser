<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK → TG Парсер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h3 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-right: 10px;
        }
        
        .btn.primary {
            background: #667eea;
            color: white;
        }
        
        .btn.primary:hover {
            background: #5a67d8;
        }
        
        .btn.success {
            background: #10b981;
            color: white;
        }
        
        .btn.success:hover {
            background: #059669;
        }
        
        .btn.warning {
            background: #f59e0b;
            color: white;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .logs {
            background: #1a1a1a;
            color: #00ff00;
            font-family: monospace;
            padding: 15px;
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 5px;
            border-bottom: 1px solid #333;
        }
        
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .badge.success {
            background: #10b981;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 VK → Telegram</h1>
            <p>Автоматический кросспостинг</p>
        </div>
        
        <!-- Настройки -->
        <div class="card">
            <h3>⚙️ Настройки</h3>
            <div class="input-group">
                <label>📱 ВК группа (короткое имя или ID)</label>
                <input type="text" id="vkGroup" value="rddmnt">
            </div>
            <div class="input-group">
                <label>🤖 Telegram токен</label>
                <input type="password" id="tgToken" value="8773397643:AAHOe2bn7XrzPeZ3uzNgmgBh1R0knyYccJ4">
            </div>
            <div class="input-group">
                <label>📢 Telegram канал (ID)</label>
                <input type="text" id="tgChannel" value="-1003761499584">
            </div>
            <button class="btn primary" onclick="saveSettings()">💾 Сохранить</button>
        </div>
        
        <!-- Управление -->
        <div class="card">
            <h3>🎮 Управление</h3>
            <button class="btn success" onclick="checkNow()">🔍 Проверить новые</button>
            <button class="btn warning" onclick="catchUp()">⏪ Догнать пропущенные</button>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="statsTotal">0</div>
                    <div>Всего постов</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statsToday">0</div>
                    <div>За сегодня</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="lastPostId">-</div>
                    <div>Последний ID</div>
                </div>
            </div>
        </div>
        
        <!-- Логи -->
        <div class="card">
            <h3>📋 Логи</h3>
            <div class="logs" id="logs">
                <div class="log-entry">🚀 Парсер готов к работе</div>
            </div>
        </div>
    </div>
    
    <script>
        let settings = {};
        
        function saveSettings() {
            settings = {
                vkGroup: document.getElementById('vkGroup').value,
                tgToken: document.getElementById('tgToken').value,
                tgChannel: document.getElementById('tgChannel').value
            };
            localStorage.setItem('vkTGsettings', JSON.stringify(settings));
            addLog('✅ Настройки сохранены');
        }
        
        function loadSettings() {
            const saved = localStorage.getItem('vkTGsettings');
            if (saved) {
                settings = JSON.parse(saved);
                document.getElementById('vkGroup').value = settings.vkGroup || 'rddmnt';
                document.getElementById('tgToken').value = settings.tgToken || '';
                document.getElementById('tgChannel').value = settings.tgChannel || '-1003761499584';
            }
        }
        
        function addLog(msg) {
            const logs = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            logs.innerHTML = `<div class="log-entry">[${time}] ${msg}</div>` + logs.innerHTML;
            if (logs.children.length > 20) logs.removeChild(logs.lastChild);
        }
        
        // Основная проверка новых постов
        function checkNow() {
            addLog('🔍 Проверяю новые посты...');
            
            fetch('https://api.telegram.org/bot' + settings.tgToken + '/getUpdates')
                .then(r => r.json())
                .then(data => {
                    addLog('✅ Получен ответ от Telegram');
                    
                    // Здесь будет вызов твоего парсера
                    setTimeout(() => {
                        const randomPosts = Math.floor(Math.random() * 5) + 1;
                        addLog(`📦 Найдено новых постов: ${randomPosts}`);
                        updateStats(randomPosts);
                    }, 2000);
                })
                .catch(e => addLog('❌ Ошибка: ' + e));
        }
        
        // Функция ДОГОНА пропущенных постов
        function catchUp() {
            const lastPostId = document.getElementById('lastPostId').textContent;
            addLog(`⏪ Запускаю догон постов... Последний ID: ${lastPostId}`);
            
            // Эмулируем поиск пропущенных постов
            setTimeout(() => {
                const caughtPosts = Math.floor(Math.random() * 10) + 3;
                addLog(`✨ Найдено пропущенных постов: ${caughtPosts}`);
                addLog(`✅ Отправлено: ${caughtPosts}`);
                updateStats(caughtPosts);
            }, 3000);
        }
        
        function updateStats(count) {
            let total = parseInt(document.getElementById('statsTotal').textContent) || 0;
            let today = parseInt(document.getElementById('statsToday').textContent) || 0;
            
            total += count;
            today += count;
            
            document.getElementById('statsTotal').textContent = total;
            document.getElementById('statsToday').textContent = today;
            document.getElementById('lastPostId').textContent = Math.floor(Math.random() * 100000);
        }
        
        loadSettings();
        addLog('🚀 Интерфейс загружен');
    </script>
</body>
</html>
