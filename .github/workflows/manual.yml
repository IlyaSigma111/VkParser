name: VK Parser Manual Control

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Команда для парсера'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - catchup
          - reset

jobs:
  run-parser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Run parser
        env:
          VK_GROUP: ${{ secrets.VK_GROUP }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHANNEL: ${{ secrets.TG_CHANNEL }}
        run: |
          python parser.py --${{ github.event.inputs.command }}
